name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write   # required for the reusable workflow's docker-publish job
                    # to resolve, even though hc-tui doesn't enable it.

jobs:
  release:
    uses: homeCore-io/hc-scripts/.github/workflows/rust-release.yml@main
    with:
      binary_name: hc-tui
      rust_version: "stable"
